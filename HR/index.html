<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心跳影像分析器 Heart Rate Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">

    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <!-- Header -->
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="text-red-500 w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    心跳影像分析器
                    <span class="text-lg text-gray-600 font-normal">Heart Rate Analyzer</span>
                </h1>
                <a href="algorithm.html" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    演算法說明
                </a>
            </div>

            <!-- Upload Section -->
            <div id="uploadSection" class="space-y-6">
                <input type="file" id="videoInput" accept="video/*" class="hidden">
                <button id="uploadBtn" class="w-full flex items-center justify-center gap-3 px-6 py-4 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-lg hover:from-blue-600 hover:to-indigo-700 transition font-semibold text-lg shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    上傳影片 Upload Video
                </button>
            </div>

            <!-- Analysis Section (Hidden initially) -->
            <div id="analysisSection" class="hidden space-y-4 mt-6">
                <!-- Canvas Container -->
                <div class="border-2 border-gray-300 rounded-lg overflow-hidden relative bg-black aspect-video flex items-center justify-center">
                    <canvas id="videoCanvas" class="max-w-full max-h-full cursor-crosshair"></canvas>
                    <div id="loadingMessage" class="absolute text-white hidden">Loading Video...</div>
                </div>
                
                <p id="instructionText" class="text-sm text-gray-600 text-center font-medium">
                    點擊影像選擇心臟位置 Click to select heart position
                </p>

                <!-- Progress Bar -->
                <div id="progressContainer" class="hidden w-full bg-gray-200 rounded-full h-4 dark:bg-gray-700 overflow-hidden">
                    <div id="progressBar" class="bg-blue-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>

                <button id="analyzeBtn" disabled class="w-full flex items-center justify-center gap-3 px-6 py-4 rounded-lg font-semibold text-lg transition shadow-md bg-gray-300 text-gray-500 cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <span id="analyzeBtnText">開始分析 Start Analysis</span>
                </button>
            </div>

            <!-- Results Section (Hidden initially) -->
            <div id="resultsSection" class="hidden space-y-6 mt-8">
                <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">分析結果 Analysis Results</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gradient-to-br from-red-50 to-red-100 p-6 rounded-lg shadow-sm border border-red-100">
                        <div class="text-sm text-gray-600 mb-1">心率 Heart Rate</div>
                        <div class="text-4xl font-bold text-red-600"><span id="resultHR">--</span></div>
                        <div class="text-sm text-gray-500">BPM</div>
                    </div>
                    
                    <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-lg shadow-sm border border-blue-100">
                        <div class="text-sm text-gray-600 mb-1">心率變異 HRV (SDNN)</div>
                        <div class="text-4xl font-bold text-blue-600"><span id="resultSDNN">--</span></div>
                        <div class="text-sm text-gray-500">ms</div>
                    </div>
                    
                    <div class="bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-lg shadow-sm border border-green-100">
                        <div class="text-sm text-gray-600 mb-1">RMSSD</div>
                        <div class="text-4xl font-bold text-green-600"><span id="resultRMSSD">--</span></div>
                        <div class="text-sm text-gray-500">ms</div>
                    </div>
                    
                    <div class="bg-gradient-to-br from-purple-50 to-purple-100 p-6 rounded-lg shadow-sm border border-purple-100">
                        <div class="text-sm text-gray-600 mb-1">影片長度 Duration</div>
                        <div class="text-4xl font-bold text-purple-600"><span id="resultDuration">--</span></div>
                        <div class="text-sm text-gray-500">seconds</div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-lg shadow-inner">
                    <h3 class="text-lg font-semibold mb-4 text-gray-800">心律圖 Heart Rate Signal</h3>
                    <canvas id="chartCanvas" width="800" height="300" class="w-full h-auto border border-gray-300 rounded bg-white"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
